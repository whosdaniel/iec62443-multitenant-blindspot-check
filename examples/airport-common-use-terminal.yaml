# Airport common-use terminal - derivation example.
#
# Derivation source:
#   - IATA Recommended Practice 1797 (Common Use Passenger Processing Systems,
#     three-role architecture: Platform Provider / Platform Operator /
#     Application Provider).
#   - IEC 62443-2-4:2023 Clauses 3.1.12 (integration SP), 3.1.13 (maintenance
#     SP), and SP.08.02 BR (SP-AO log-sharing).
#   - IEC 62443-3-2:2020 ZCR 3 Clause 4.4 (zone/conduit methodology;
#     single-partitioning-authority premise).
#   - ACRP Report 30 (2010) - first-generation CUPPS decomposition.
#
# Reproduces Table 3 of W. Kim (2026), "Compliant Yet Blind: Measuring and
# Closing Multi-Tenant Monitoring Gaps in IEC 62443".
#
# All labels are ABSTRACT ROLES. No real operator identification.
#
# Expected classification (19 in-scope conduits; CD-12 is out-of-scope per
# US 49 CFR Part 1520 SSI sensitivity and is therefore omitted from this file):
#
#   Blind spots   (3)  : CD-06, CD-08a, CD-08b
#   Borderline    (2)  : CD-04, CD-05
#   Resolved-by-SP (2) : CD-01, CD-09
#   No-cross-AO   (12) : CD-02, CD-03, CD-07, CD-10, CD-11,
#                        CD-20, CD-21, CD-22, CD-23, CD-24, CD-25, CD-26
#
# Structural blind-spot count: 3/19 = 15.8% (paper §5.4).

meta:
  schema_version: "1"
  domain: airport
  source:
    standards:
      - "IATA RP 1797"
      - "IEC 62443-2-4:2023"
      - "IEC 62443-3-2:2020"
      - "ACRP Report 30 (TRB 2010)"
    paper: "W. Kim 2026, Compliant Yet Blind §4 (Table 3)"
  disclaimer: >
    Abstract structural pattern. All labels are generic roles (APT, ALN-*, VND).
    No real airport operator, airline, or CUPPS vendor is identified. CD-12
    (explosive-detection subsystem) is out of scope per US 49 CFR Part 1520 and
    is deliberately omitted from this file.

asset_owners:
  - { id: APT,   role: AO, description: "Airport operator (Platform Provider under RP 1797)" }
  - { id: ALN-A, role: AO, description: "Tenant airline A (Application Provider under RP 1797)" }
  - { id: ALN-B, role: AO, description: "Tenant airline B" }
  - { id: ALN-C, role: AO, description: "Tenant airline C" }
  - { id: VND,   role: AO, description: "CUPPS/BHS vendor (Platform Operator); modelled as AO over its own asset class (middleware cloud, managed-NOC plane)" }

# SP-AO relationships per IEC 62443-2-4.
# Only CD-01 and CD-09 are covered under a VND -> APT SP scope per paper §4,
# Table 3 ('Resolved by SP relationship' rows). All other APT-only or VND-only
# same-owner paths fall out of SC-1 and do not need an sp_relations entry.
sp_relations:
  - { sp: VND, ao: APT, scope: [CD-01, CD-09] }

# Zone partitioning authority (NC-2 evaluation).
# Per IEC 62443-3-2:2020 ZCR 3 Clause 4.4, a single organisation designates
# each zone. Under today's common-use deployments a single IDP operator
# (the airport) holds both sides of the federation trust - paper §8 notes
# that CD-04/CD-05 become blind spots *only if* airport and vendor evolve
# to independent Keycloak instances with OIDC federation.
zone_authorities:
  - { zone: VLAN-IDF,         org: APT }
  - { zone: VLAN-Core,        org: APT }
  - { zone: VLAN-DMZ,         org: APT }
  - { zone: VLAN-NTP,         org: APT }
  - { zone: VLAN-IDP,         org: APT }
  - { zone: VLAN-IDP-Fed-VND, org: APT }
  - { zone: VLAN-IDP-Fed-ALN, org: APT }
  - { zone: VLAN-VND-MW,      org: VND }
  - { zone: VLAN-VND-MGMT,    org: VND }
  - { zone: VLAN-VND-Cloud,   org: VND }
  - { zone: VLAN-ALN-A,       org: ALN-A }
  - { zone: VLAN-ALN-B,       org: ALN-B }
  - { zone: VLAN-ALN-C,       org: ALN-C }

conduits:
  # -------------------------------------------------------------------------
  # Resolved by SP relationship (2): CD-01, CD-09
  # Cross-AO (SC-1) but covered by VND -> APT SP scope per 62443-2-4.
  # -------------------------------------------------------------------------
  - id: CD-01
    description: "VND Cloud to DMZ - vendor config push"
    from: { owner: VND, zone: VLAN-VND-Cloud, asset: "Vendor cloud platform" }
    to:   { owner: APT, zone: VLAN-DMZ,       asset: "DMZ config relay" }
    transit_owner: VND
    transit_asset: "Vendor-authored configuration bundle in transit (pre-commissioning)"
    notes: "VND is SP to APT per IEC 62443-2-4 SP.08.02 BR; obligations flow via the SP-AO contract."

  - id: CD-09
    description: "VND Cloud to CUPPS middleware management plane"
    from: { owner: VND, zone: VLAN-VND-Cloud, asset: "Vendor cloud platform" }
    to:   { owner: APT, zone: VLAN-VND-MW,    asset: "CUPPS middleware (APT-owned HW, VND-operated)" }
    transit_owner: APT
    transit_asset: "Management-plane traffic against APT-commissioned middleware (IEC 62443-2-4 Cl. 3.1.13)"
    notes: "VND is SP to APT for middleware management; covered under sp_relations."

  # -------------------------------------------------------------------------
  # No-cross-AO: APT HW at both endpoints (5): CD-02, CD-03, CD-07, CD-10, CD-11
  # SC-1 not satisfied - no independent AO asset at either endpoint.
  # VND participation is under an SP agreement for integration/maintenance
  # (IEC 62443-2-4 Clauses 3.1.12 / 3.1.13), not as an independent AO.
  # -------------------------------------------------------------------------
  - id: CD-02
    description: "DMZ to BHS workstation - APT-owned path"
    from: { owner: APT, zone: VLAN-DMZ,  asset: "DMZ relay" }
    to:   { owner: APT, zone: VLAN-Core, asset: "BHS engineering workstation" }
    notes: "APT HW at both endpoints; VND under SP agreement for maintenance - no independent AO asset."

  - id: CD-03
    description: "BHS workstation to BHS PLC - APT-owned path"
    from: { owner: APT, zone: VLAN-Core, asset: "BHS engineering workstation" }
    to:   { owner: APT, zone: VLAN-Core, asset: "BHS PLC" }
    notes: "APT HW at both endpoints; VND-supplied PLC code under SP agreement - no independent AO asset."

  - id: CD-07
    description: "BHS PLC to IDF switch"
    from: { owner: APT, zone: VLAN-Core, asset: "BHS PLC" }
    to:   { owner: APT, zone: VLAN-IDF,  asset: "IDF switch" }
    notes: "APT HW at both endpoints; VND code under SP agreement."

  - id: CD-10
    description: "NTP to CUPPS workstation - APT utility"
    from: { owner: APT, zone: VLAN-NTP, asset: "NTP server" }
    to:   { owner: APT, zone: VLAN-IDF, asset: "CUPPS thin client" }
    notes: "APT-operated utility; single-AO path."

  - id: CD-11
    description: "DMZ to IDF - APT internal path"
    from: { owner: APT, zone: VLAN-DMZ, asset: "DMZ jump host" }
    to:   { owner: APT, zone: VLAN-IDF, asset: "IDF switch" }
    notes: "APT-owned path at both endpoints; internal APT-VND SP interaction."

  # -------------------------------------------------------------------------
  # Borderline (2): CD-04, CD-05
  # Federation trust under a single IDP operator. SC-1 and NC-1 both hold,
  # but APT designates both federation zones so NC-2 fails.
  # Paper §8 notes these transition to blind-spot if airport and vendor
  # evolve to independent Keycloak instances with OIDC federation.
  # -------------------------------------------------------------------------
  - id: CD-04
    description: "VND Cloud to airport IDP via federation"
    from: { owner: VND, zone: VLAN-IDP-Fed-VND, asset: "Vendor OIDC client" }
    to:   { owner: APT, zone: VLAN-IDP,         asset: "IDP federation endpoint" }
    transit_owner: VND
    transit_asset: "Vendor-authored OIDC authentication request (RFC 6749)"
    notes: "Federation trust under single IDP operator (APT designates both zones); borderline until airport/vendor split into independent IDP operators."

  - id: CD-05
    description: "Airport IDP to DMZ - federated identity outbound (paper Table 3 canonical leg)"
    from: { owner: APT, zone: VLAN-IDP, asset: "IDP federation endpoint (APT)" }
    to:   { owner: APT, zone: VLAN-DMZ, asset: "DMZ relying service (APT)" }
    transit_owner: VND
    transit_asset: "VND-issued federated identity assertion (OpenID Connect Core 1.0 §2)"
    notes: "VND-issued federated identity claim traverses APT-operated IDP and DMZ. Paper §4 canonical leg of the federation flow; NC-2 fails because APT designates both endpoint zones. Borderline until the VND-side IDP is operated by an independent organisation."

  # -------------------------------------------------------------------------
  # Structural blind spots (3): CD-06 (latent), CD-08a (active), CD-08b (active)
  # SC-1 AND NC-1 AND NC-2 all hold.
  # -------------------------------------------------------------------------
  - id: CD-06
    description: "CUPPS workstation to IDF switch - latent cross-tenant leakage"
    from: { owner: APT, zone: VLAN-ALN-B, asset: "CUPPS Workstation (APT HW, ALN-B tenant session context)" }
    to:   { owner: APT, zone: VLAN-IDF,   asset: "IDF switch (APT HW)" }
    transit_owner: ALN-B
    transit_asset: "ALN-B DCS session traffic transiting APT-owned infrastructure (IATA RP 1797 AP)"
    notes: "APT HW at both endpoints; ALN-B-owned DCS traffic transits (SC-1 D1). ALN-B designates the tenant session zone context, APT designates the switch zone, so NC-2 holds. LATENT: under correct VLAN configuration no cross-tenant traffic flows, but zero safety margin if the VLAN boundary degrades through misconfiguration or firmware regression."

  - id: CD-08a
    description: "CUPPS workstation to middleware - 3-tenant session heartbeat"
    from: { owner: APT, zone: VLAN-IDF,    asset: "CUPPS Workstation (APT HW, 3-tenant session coexistence)" }
    to:   { owner: APT, zone: VLAN-VND-MW, asset: "CUPPS middleware (APT HW, VND-operated)" }
    transit_owner: ALN-A
    transit_asset: "ALN-A DCS session heartbeat (IATA RP 1797 AP-owned)"
    notes: "ACTIVE: traffic flows whenever an airline session is open. APT HW at both endpoints but ALN-A session state transits (SC-1 D1). APT designates the WS zone, VND designates the MW operational zone - NC-2 holds. Three-tenant workstation coexistence; each airline is an independent AO."

  - id: CD-08b
    description: "Middleware to airline DCS session-update (PP/AP boundary)"
    from: { owner: APT,   zone: VLAN-VND-MW, asset: "CUPPS middleware (APT HW, VND-operated)" }
    to:   { owner: ALN-A, zone: VLAN-ALN-A,  asset: "Airline DCS (ALN HW)" }
    transit_owner: ALN-A
    transit_asset: "ALN-A DCS session update crossing the PP/AP seam (IATA RP 1797)"
    notes: "ACTIVE: PP/AP seam per IATA RP 1797. Endpoints cross asset-owner boundary (APT MW HW to ALN DCS) and ALN owns the session artefact. Airline is independent Application Provider, not SP to airport or vendor - IEC 62443-2-4 is inapplicable to this conduit."

  # -------------------------------------------------------------------------
  # Single-tenant internal (7): CD-20 .. CD-26
  # SC-1 not satisfied - these are included for completeness so that the
  # reproduced distribution matches paper Table 3 exactly.
  # -------------------------------------------------------------------------
  - id: CD-20
    description: "Airport IT internal - SIEM to log server"
    from: { owner: APT, zone: VLAN-Core, asset: "SIEM" }
    to:   { owner: APT, zone: VLAN-Core, asset: "Log archive server" }

  - id: CD-21
    description: "Airport IT internal - FIDS to backbone"
    from: { owner: APT, zone: VLAN-Core, asset: "FIDS cluster" }
    to:   { owner: APT, zone: VLAN-Core, asset: "Backbone router" }

  - id: CD-22
    description: "Airport IT internal - AODB replication"
    from: { owner: APT, zone: VLAN-Core, asset: "AODB primary" }
    to:   { owner: APT, zone: VLAN-Core, asset: "AODB replica" }

  - id: CD-23
    description: "Airport IT internal - backup replication"
    from: { owner: APT, zone: VLAN-Core, asset: "Backup master" }
    to:   { owner: APT, zone: VLAN-Core, asset: "Backup target" }

  - id: CD-24
    description: "Airline cloud to DCS - airline-internal path"
    from: { owner: ALN-A, zone: VLAN-ALN-A, asset: "Airline reservation cloud relay" }
    to:   { owner: ALN-A, zone: VLAN-ALN-A, asset: "Airline DCS backend" }

  - id: CD-25
    description: "Building management system - internal replication"
    from: { owner: APT, zone: VLAN-Core, asset: "BMS primary" }
    to:   { owner: APT, zone: VLAN-Core, asset: "BMS replica" }

  - id: CD-26
    description: "Building management - controller to gateway"
    from: { owner: APT, zone: VLAN-Core, asset: "BMS controller" }
    to:   { owner: APT, zone: VLAN-Core, asset: "BMS field gateway" }
