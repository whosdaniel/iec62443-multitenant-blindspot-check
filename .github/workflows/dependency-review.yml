# Dependency Review: on every pull request, check that no newly-introduced
# or upgraded dependency carries a known vulnerability, and that licences
# of new deps are compatible with the project's MIT license.
#
# Fails the PR (and blocks merge when branch protection requires this check)
# if any dep has severity >= moderate, or carries a disallowed licence.

name: dependency-review

on:
  pull_request:
    branches: [ main ]

# Least-privilege: the action reads the PR diff. No write access needed.
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.1.7
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/dependency-review-action v4.9.0
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # Allow MIT + common permissive licences compatible with this project.
          allow-licenses: >-
            MIT,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            Python-2.0,
            PSF-2.0,
            Unlicense,
            CC0-1.0,
            0BSD
