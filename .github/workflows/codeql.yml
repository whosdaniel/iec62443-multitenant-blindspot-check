# CodeQL: static analysis for injection / RCE / unsafe-call patterns in the
# Python source. Runs on push to main, on every PR, and on a weekly cadence
# so freshly-published queries still scan unchanged code.
#
# Output is posted to the repo's Security -> Code scanning tab.

name: codeql

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly at 04:17 UTC Monday
    - cron: "17 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ "python" ]

    steps:
      # actions/checkout v4.1.7
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      # github/codeql-action/init v3.26.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@4dd16135b69a43b6c8efb853346f8437d92d3c93
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # github/codeql-action/analyze v3.26.0
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4dd16135b69a43b6c8efb853346f8437d92d3c93
        with:
          category: "/language:${{ matrix.language }}"
