name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Minimum token permissions.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      # actions/checkout v4.1.7
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      # actions/setup-python v5.1.1
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable) + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: "3.12"

      - name: Install dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: bandit - Python security linter
        run: bandit -r blindspotcheck -ll

      - name: pip-audit - dependency CVE scan
        # pip-audit fails on known vulnerabilities in transitive deps.
        run: pip-audit

  js-test:
    # Runs the JS evaluator unit tests (node:test) against the same
    # fixtures used by the Python parity tests. The Python-side parity
    # suite (tests/test_parity.py) re-runs these via subprocess.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      # actions/setup-node v4.0.4
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Run JS unit tests
        run: |
          node --test \
            tests/web/test_evaluator.mjs \
            tests/web/test_templates.mjs \
            tests/web/test_history.mjs \
            tests/web/test_yaml_export.mjs \
            tests/web/test_persistence.mjs \
            tests/web/test_serialize.mjs

      - name: JS parse-check all web modules
        # Catches syntax regressions in the browser-only modules (which
        # cannot be imported into Node because they touch document/window).
        run: |
          for f in web/*.js; do
            echo "--- node --check $f"
            node --check "$f"
          done
