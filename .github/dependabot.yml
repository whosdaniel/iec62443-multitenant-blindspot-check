# Dependabot: weekly dependency-update PRs + security-advisory alerts.
# Scopes:
#   - Python (pip): runtime and dev dependencies declared in pyproject.toml.
#   - GitHub Actions (.github/workflows/*): SHA-pinned actions are still
#     monitored so we receive update PRs for pinned hashes.
#
# Dependabot's auto-opened PRs run the full CI matrix (pytest, bandit,
# pip-audit, CodeQL, dependency-review), so any update that introduces a
# vulnerability will fail the PR before merge.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
