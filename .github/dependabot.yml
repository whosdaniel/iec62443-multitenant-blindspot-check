# Dependabot: weekly dependency-update PRs for Python runtime/dev deps.
#
# GitHub Actions are intentionally NOT tracked here. Workflow actions are
# pinned by commit SHA as a supply-chain control, and we take major
# bumps manually when there is a specific reason to (security advisory,
# new feature we want). Repo-level Dependabot Alerts still fire on any
# real CVE regardless of what's configured in this file, so we keep
# coverage for actual vulnerabilities while avoiding weekly PR churn.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
